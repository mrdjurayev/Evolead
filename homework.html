<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homework | Evolead</title>
  <meta
    name="description"
    content="Track the latest Evolead homework checklist with saved progress, study links, and clear completion feedback."
  />
  <meta name="theme-color" content="#2f7d57" />
  <link rel="canonical" href="https://evolead.site/homework.html" />

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2ZB2HSNN3H"></script>
  <script src="analytics.js?v=20260317-1"></script>

  <link rel="stylesheet" href="shared.css?v=20260317-1" />
  <link rel="stylesheet" href="homework.css?v=20260317-1" />
</head>

<body>
  <div class="site-shell">
    <div class="site-page homework-page">
      <div class="site-topbar">
        <a href="index.html" class="site-back-link">&larr; Main Menu</a>
      </div>

      <main class="homework-main">
        <section class="card">
          <h1 class="sr-only">Homework</h1>

          <section class="progress-panel" aria-label="Homework progress">
            <div class="progress-meta">
              <div>
                <p class="progress-label">Completion</p>
                <strong id="progressLabel">Start by ticking the finished tasks.</strong>
                <p class="progress-count" id="progressCount">0 of 0 done</p>
              </div>
              <span class="progress-percent" id="progressPercent">0%</span>
            </div>

            <div class="progress-track" aria-hidden="true">
              <span class="progress-fill" id="progressFill"></span>
            </div>

            <div class="progress-stats">
              <div class="progress-stat">
                <span class="progress-stat-label">Published</span>
                <strong id="publishedAt">-</strong>
              </div>
              <div class="progress-stat">
                <span class="progress-stat-label">Tasks</span>
                <strong id="totalTasks">0</strong>
              </div>
              <div class="progress-stat">
                <span class="progress-stat-label">Completed</span>
                <strong id="completedTasks">0</strong>
              </div>
            </div>
          </section>

          <div class="content">
            <section class="checklist-block">
              <div class="checklist" id="checklist"></div>
            </section>

            <aside class="panel">
              <div class="panel-head">
                <h2 class="panel-title">Useful links</h2>
              </div>

              <ul class="links" id="usefulLinks"></ul>
            </aside>
          </div>

          <div class="footer">
            <div class="status" id="statusMsg" aria-live="polite"></div>

            <div class="buttons">
              <button id="checkBtn" type="button">Finish</button>
              <button id="resetBtn" type="button" class="reset">Reset all</button>
            </div>

            <button class="help-btn" id="helpBtn" type="button" aria-label="Instructions">?</button>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- Instructions Modal -->
  <div class="modal-backdrop" id="helpModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="helpTitle">
      <h2 id="helpTitle" class="modal-title">
        <span class="info-icon">ℹ</span>
        Instructions
      </h2>

      <ol class="modal-list" id="helpList"></ol>

      <div class="modal-actions">
        <button id="helpOkBtn" type="button">OK</button>
      </div>
    </div>
  </div>

  <!-- Congratulations Modal -->
  <div class="modal-backdrop" id="modal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">
      <h2>🎉 Congratulations!</h2>
      <p id="completionSummary">You have completed all homework tasks.</p>
      <button id="okBtn" type="button">OK</button>
    </div>
  </div>

  <script src="shared.js?v=20260317-1"></script>
  <script src="homework-data.js?v=20260317-1"></script>
  <script src="homework.js?v=20260317-2"></script>
</body>
</html>
