<!doctype html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evolead | Courses</title>
  <meta
    name="description"
    content="Courses: course names and lesson videos."
  />
  <meta name="theme-color" content="#ffffff" />
  <link rel="canonical" href="https://evolead.site/courses.html" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Evolead" />
  <meta property="og:title" content="Evolead | Courses" />
  <meta
    property="og:description"
    content="Courses: course names and lesson videos."
  />
  <meta property="og:url" content="https://evolead.site/courses.html" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Evolead | Courses" />
  <meta
    name="twitter:description"
    content="Courses: course names and lesson videos."
  />
  <link rel="stylesheet" href="assets/courses.css" />
</head>
<body>
  <main class="page">
    <div class="page-header">
      <h1>Courses</h1>
      <a class="back-link" href="index.html">
        <i data-lucide="arrow-left" aria-hidden="true"></i>
        <span>Back</span>
      </a>
    </div>

    <section class="courses-shell" aria-label="Courses">
      <div class="courses-stack">
        <details class="course-card" open>
          <summary class="course-summary">
            <div class="course-summary-main">
              <strong class="course-title">English — Foundation</strong>
              <span class="course-subtitle">Grammar + Listening basics</span>
            </div>
            <span class="course-count">
              <i data-lucide="video" aria-hidden="true"></i>
              <span>3 videos</span>
            </span>
          </summary>

          <div class="course-body">
            <div class="video-grid" role="list">
              <article class="video-card" role="listitem">
                <iframe
                  class="video-frame"
                  src="https://www.youtube.com/embed/C4KWsmezXm4"
                  title="English Foundation - Lesson 1"
                  loading="lazy"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                  allowfullscreen
                ></iframe>
              </article>

              <article class="video-card" role="listitem">
                <iframe
                  class="video-frame"
                  src="https://www.youtube.com/embed/KF4zd2hb2nk"
                  title="English Foundation - Lesson 2"
                  loading="lazy"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                  allowfullscreen
                ></iframe>
              </article>

              <article class="video-card" role="listitem">
                <iframe
                  class="video-frame"
                  src="https://www.youtube.com/embed/eFiHaEgXRlc"
                  title="English Foundation - Lesson 3"
                  loading="lazy"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                  allowfullscreen
                ></iframe>
              </article>
            </div>
          </div>
        </details>

        <details class="course-card">
          <summary class="course-summary">
            <div class="course-summary-main">
              <strong class="course-title">Programming — JavaScript</strong>
              <span class="course-subtitle">Core concepts + practice</span>
            </div>
            <span class="course-count">
              <i data-lucide="video" aria-hidden="true"></i>
              <span>2 videos</span>
            </span>
          </summary>

          <div class="course-body">
            <div class="video-grid" role="list">
              <article class="video-card" role="listitem">
                <iframe
                  class="video-frame"
                  src="https://www.youtube.com/embed/Wd_m0ugpcTs"
                  title="JavaScript - Lesson 1"
                  loading="lazy"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                  allowfullscreen
                ></iframe>
              </article>

              <article class="video-card" role="listitem">
                <iframe
                  class="video-frame"
                  src="https://www.youtube.com/embed/40EUuj8XWCo"
                  title="JavaScript - Lesson 2"
                  loading="lazy"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                  allowfullscreen
                ></iframe>
              </article>
            </div>
          </div>
        </details>
      </div>
    </section>
  </main>

  <script defer src="https://unpkg.com/lucide@0.563.0/dist/umd/lucide.min.js"></script>
  <script defer src="assets/icons.js"></script>
</body>
</html>
