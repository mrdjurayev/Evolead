  <style>
    :root {
      color-scheme: light;
      --page-bg: #ffffff;
      --text: #1f2937;
      --muted: #64748b;
      --line: #dbe3f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: var(--page-bg);
    }

    .page {
      width: min(1220px, calc(100% - 24px));
      margin: 0 auto;
      padding: 20px 0 28px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 8px;
    }

    .header-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.375rem, 2.5vw, 1.875rem);
      line-height: 1.15;
      letter-spacing: -0.02em;
      font-weight: 600;
    }

    .select-wrap {
      position: relative;
      min-width: 164px;
    }

    .select-trigger,
    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--text);
      font: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
    }

    .select-trigger {
      width: 100%;
      cursor: pointer;
      outline: none;
    }

    .select-trigger:focus {
      border-color: var(--muted);
    }

    .select-icon {
      width: 14px;
      height: 14px;
      color: var(--muted);
      flex: 0 0 auto;
      transition: transform 0.16s ease;
    }

    .select-wrap.is-open .select-icon {
      transform: rotate(180deg);
    }

    .select-menu {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      display: none;
      padding: 6px;
      border: 1px solid var(--line);
      background: #ffffff;
      z-index: 10;
    }

    .select-wrap.is-open .select-menu {
      display: grid;
      gap: 2px;
    }

    .select-option {
      min-height: 34px;
      padding: 0 10px;
      border: 0;
      background: #ffffff;
      color: var(--text);
      text-align: left;
      font: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
    }

    .select-option:hover {
      background: #fafafa;
    }

    .select-option.is-selected {
      font-weight: 600;
    }

    .back-link svg {
      width: 13px;
      height: 13px;
      display: block;
      color: var(--muted);
      stroke-width: 2;
      flex: 0 0 auto;
    }

    .subject-panel {
      margin-top: 20px;
    }

    .phase-stack {
      display: grid;
      gap: 18px;
    }

    .phase {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 20px;
      padding: 18px 0;
      border-top: 1px solid var(--line);
    }

    .phase:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .phase-label {
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .phase-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      min-height: 32px;
      padding: 0 12px;
      border: 1px solid var(--line);
      background: #ffffff;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .phase-kicker::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: currentColor;
      flex: 0 0 auto;
    }

    .phase-kicker--foundation {
      color: #2563eb;
    }

    .phase-kicker--comprehension {
      color: #16a34a;
    }

    .phase-kicker--depth {
      color: #ca8a04;
    }

    .phase-kicker--advanced {
      color: #ea580c;
    }

    .phase-kicker--polish {
      color: #dc2626;
    }

    .phase-track {
      position: relative;
      display: grid;
      gap: 12px;
      padding-left: 26px;
    }

    .phase-track::before {
      content: "";
      position: absolute;
      left: 8px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--line);
    }

    .phase-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      background: #ffffff;
    }

    .phase-item::before {
      content: "";
      position: absolute;
      left: -23px;
      top: 18px;
      width: 12px;
      height: 12px;
      border: 2px solid #ffffff;
      border-radius: 999px;
      background: var(--dot-color, #9ca3af);
      box-sizing: border-box;
    }

    .phase-item--foundation {
      --dot-color: #2563eb;
    }

    .phase-item--comprehension {
      --dot-color: #16a34a;
    }

    .phase-item--depth {
      --dot-color: #ca8a04;
    }

    .phase-item--advanced {
      --dot-color: #ea580c;
    }

    .phase-item--polish {
      --dot-color: #dc2626;
    }

    .phase-link {
      flex: 1 1 auto;
      color: var(--text);
      text-decoration: none;
    }

    .phase-link:hover strong {
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .phase-item strong {
      display: block;
      font-size: 0.96rem;
      line-height: 1.35;
      font-weight: 700;
    }

    .phase-item:hover {
      background: #fafafa;
    }

    .phase-item--focused {
      border-color: #4ade80;
      background: #dcfce7;
    }

    .phase-check {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .phase-check input {
      width: 18px;
      height: 18px;
      margin: 0;
      cursor: pointer;
      accent-color: var(--dot-color, #2563eb);
    }

    .phase-item.is-complete strong {
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-thickness: 1px;
    }

    @media (max-width: 900px) {
      .page {
        width: min(100%, calc(100% - 20px));
        padding-top: 16px;
      }

      .page-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .header-actions {
        flex-wrap: wrap;
      }

      .phase {
        grid-template-columns: 1fr;
        gap: 14px;
      }
    }
  </style>

      function createTextElement(tagName, textContent) {
        const element = document.createElement(tagName);
        element.textContent = textContent;
        return element;
      }

      function readStorage(key, fallback) {
        try {
          const value = window.localStorage.getItem(key);
          return value === null ? fallback : value;
        } catch {
          return fallback;
        }
      }

      function writeStorage(key, value) {
        try {
          window.localStorage.setItem(key, value);
        } catch {
          // Ignore storage errors and keep the UI usable.
        }
      }

      function removeStorage(key) {
        try {
          window.localStorage.removeItem(key);
        } catch {
          // Ignore storage errors and keep the UI usable.
        }
      }

      function createSubjectOption(subjectName, isSelected) {
        const option = document.createElement("button");

        option.className = "select-option";
        if (isSelected) {
          option.classList.add("is-selected");
        }

        option.type = "button";
        option.dataset.value = subjectName;
        option.setAttribute("aria-selected", String(isSelected));
        option.textContent = subjectName;
        return option;
      }

      function createCheckbox(itemKey, title) {
        const labelElement = document.createElement("label");
        const checkbox = document.createElement("input");

        labelElement.className = "phase-check";
        checkbox.type = "checkbox";
        checkbox.dataset.progressKey = itemKey;
        checkbox.setAttribute("aria-label", "Mark " + title + " as completed");

        labelElement.appendChild(checkbox);
        return labelElement;
      }

      function createPhaseItem(item, tone) {
        const itemElement = document.createElement("div");
        const linkElement = document.createElement("a");
        const titleElement = createTextElement("strong", item.title);

        itemElement.className = "phase-item phase-item--" + tone;
        itemElement.dataset.itemKey = item.key;
        linkElement.className = "phase-link";
        linkElement.href = item.href;
        linkElement.target = "_blank";
        linkElement.rel = "noopener noreferrer";
        linkElement.appendChild(titleElement);

        itemElement.appendChild(linkElement);
        itemElement.appendChild(createCheckbox(item.key, item.title));
        return itemElement;
      }

      function createPhase(phase) {
        const section = document.createElement("section");
        const labelWrap = document.createElement("div");
        const badge = document.createElement("span");
        const track = document.createElement("div");

        section.className = "phase";
        labelWrap.className = "phase-label";
        badge.className = "phase-kicker phase-kicker--" + phase.tone;
        badge.textContent = phase.label;
        track.className = "phase-track";

        phase.items.forEach((item) => {
          track.appendChild(createPhaseItem(item, phase.tone));
        });

        labelWrap.appendChild(badge);
        section.appendChild(labelWrap);
        section.appendChild(track);
        return section;
      }

      function createSubjectStack(subject) {
        const stack = document.createElement("div");

        stack.className = "phase-stack";
        subject.phases.forEach((phase) => {
          stack.appendChild(createPhase(phase));
        });

        return stack;
      }

      function renderSubject(subjectName) {
        const subject = SUBJECTS[subjectName];
        if (!subject) return;

        panel.replaceChildren(createSubjectStack(subject));
        bindProgressCheckboxes();
      }

      function getRequestedFocus() {
        const params = new URLSearchParams(window.location.search);
        const subject = params.get("subject") || "";
        const itemKey = params.get("item") || "";
        return { subject, itemKey };
      }

      function clearFocusedItems() {
        panel.querySelectorAll(".phase-item--focused").forEach((item) => {
          item.classList.remove("phase-item--focused");
        });
      }

      function focusRequestedItem(itemKey) {
        if (!itemKey) {
          clearFocusedItems();
          return;
        }

        const items = panel.querySelectorAll(".phase-item");
        items.forEach((item) => {
          item.classList.toggle("phase-item--focused", item.dataset.itemKey === itemKey);
        });

        const target = panel.querySelector('[data-item-key="' + itemKey + '"]');
        if (!target) return;

        target.setAttribute("tabindex", "-1");
        target.scrollIntoView({
          behavior: "smooth",
          block: "center",
        });
        target.focus({ preventScroll: true });
      }

      function focusSubjectPanel() {
        clearFocusedItems();
        panel.scrollIntoView({
          behavior: "smooth",
          block: "start",
        });
      }

      function bindProgressCheckboxes() {
        const checkboxes = panel.querySelectorAll("[data-progress-key]");

        checkboxes.forEach((checkbox) => {
          const storageKey = storageKeys.progressPrefix + checkbox.dataset.progressKey;
          const item = checkbox.closest(".phase-item");

          checkbox.checked = readStorage(storageKey, "") === "1";
          item?.classList.toggle("is-complete", checkbox.checked);

          checkbox.addEventListener("change", () => {
            item?.classList.toggle("is-complete", checkbox.checked);

            if (checkbox.checked) {
              writeStorage(storageKey, "1");
            } else {
              removeStorage(storageKey);
            }
          });
        });
      }

      function setOpenState(isOpen) {
        dropdown.classList.toggle("is-open", isOpen);
        trigger.setAttribute("aria-expanded", String(isOpen));
      }

      function updateMenuSelection(selectedSubject) {
        const options = menu.querySelectorAll(".select-option");

        options.forEach((option) => {
          const isSelected = option.dataset.value === selectedSubject;
          option.classList.toggle("is-selected", isSelected);
          option.setAttribute("aria-selected", String(isSelected));
        });
      }

      function applyRequestedFocus(subjectName) {
        if (subjectName !== requestedFocus.subject) return;

        if (requestedFocus.itemKey) {
          focusRequestedItem(requestedFocus.itemKey);
        } else {
          focusSubjectPanel();
        }
      }

      function setSelectedSubject(subjectName) {
        label.textContent = subjectName;
        updateMenuSelection(subjectName);
        renderSubject(subjectName);
        writeStorage(storageKeys.subject, subjectName);
        applyRequestedFocus(subjectName);
      }

      function buildSubjectMenu() {
        const subjectNames = Object.keys(SUBJECTS);
        const initialSubject = requestedFocus.subject || readStorage(storageKeys.subject, DEFAULT_SUBJECT);
        const safeSubject = SUBJECTS[initialSubject] ? initialSubject : DEFAULT_SUBJECT;

        menu.replaceChildren(
          ...subjectNames.map((subjectName) =>
            createSubjectOption(subjectName, subjectName === safeSubject)
          )
        );

        menu.querySelectorAll(".select-option").forEach((option) => {
          option.addEventListener("click", () => {
            setSelectedSubject(option.dataset.value || DEFAULT_SUBJECT);
            setOpenState(false);
          });
        });

        setSelectedSubject(safeSubject);
      }

      trigger.addEventListener("click", () => {
        setOpenState(!dropdown.classList.contains("is-open"));
      });

      document.addEventListener("click", (event) => {
        if (!(event.target instanceof Node)) return;
        if (dropdown.contains(event.target)) return;
        setOpenState(false);
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          setOpenState(false);
        }
      });

      buildSubjectMenu();

      if (window.lucide) {
        window.lucide.createIcons();
      }
    })();
  </script>
</body>
</html>
