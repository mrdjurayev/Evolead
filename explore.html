  <meta
    name="description"
    content="Explore videos, resources, and useful learning materials."

  <meta name="theme-color" content="#ffffff" />
  <link rel="canonical" href="https://evolead.site/explore.html" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Evolead" />
  <meta property="og:title" content="Evolead | Explore" />
  <meta
    property="og:description"
    content="Explore videos, resources, and useful learning materials."
  />
  <meta property="og:url" content="https://evolead.site/explore.html" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Evolead | Explore" />

    name="twitter:description"
    content="Explore videos, resources, and useful learning materials."

  <script>if(sessionStorage.getItem('evolead_auth')!=='6b5a4fc321df1cf3f68311c38e9b067d32cd1b6dab16528845efc8d2b0090670'){location.replace('login.html')}</script>
</head>
<body>
  <main class="page">
    <div class="page-header">
      <h1>Explore</h1>
      <a class="back-link" href="index.html">
        <i data-lucide="arrow-left" aria-hidden="true"></i>
        <span>Back</span>
      </a>
    </div>

    <div class="add-bar">
      <input
        class="add-input"
        id="videoUrlInput"
        type="url"
        placeholder="Paste a YouTube link here..."
        autocomplete="off"
        spellcheck="false"
      />
      <button class="add-btn" id="addVideoBtn" type="button">
        <i data-lucide="plus" aria-hidden="true"></i>
        <span>Add</span>
      </button>
    </div>

    <section class="explore-shell" aria-label="Explore content">
      <div class="video-grid" id="videoGrid"></div>
    </section>
  </main>

  <script defer src="https://unpkg.com/lucide@0.563.0/dist/umd/lucide.min.js"></script>
  <script defer src="assets/explore.js"></script>
  <script defer src="assets/icons.js"></script>
</body>
</html>
