  <style>
    :root {
      color-scheme: light;
      --page-bg: #ffffff;
      --text: #1f2937;
      --muted: #64748b;
      --line: #dbe3f0;
      --panel: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: var(--page-bg);
    }

    .page {
      width: min(1220px, calc(100% - 24px));
      margin: 0 auto;
      padding: 20px 0 28px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.375rem, 2.5vw, 1.875rem);
      line-height: 1.15;
      letter-spacing: -0.02em;
      font-weight: 600;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--text);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .back-link i {
      width: 14px;
      height: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
    }

    .back-link i svg {
      width: 14px;
      height: 14px;
      display: block;
    }

    .explore-shell {
      min-height: 420px;
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 20px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .video-card {
      border: 1px solid var(--line);
      background: #ffffff;
      overflow: hidden;
    }

    .video-frame {
      aspect-ratio: 16 / 9;
      width: 100%;
      border: 0;
    }

    @media (max-width: 900px) {
      .page {
        width: min(100%, calc(100% - 20px));
        padding-top: 16px;
      }

      .page-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .explore-shell {
        padding: 14px;
      }

      .video-grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }
    }
  </style>
</head>
